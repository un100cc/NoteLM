<style>
.layout{display:flex;margin-top:104px;height:calc(100vh - 104px);}
.chart-area{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border);}

.tf-row{display:flex;gap:2px;margin-left:auto;align-items:center;}
.tf-btn{padding:4px 9px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;background:transparent;border:none;color:var(--text2);}
.tf-btn:hover{color:var(--text1);}.tf-btn.active{background:var(--bg3);color:var(--blue);}
.ptogs{display:flex;gap:5px;margin-left:10px;padding-left:10px;border-left:1px solid var(--border);}

.ptog.p123{color:#f59e0b;}.ptog.p123.on{background:#f59e0b20;border-color:#f59e0b;color:#f59e0b;filter:none;}

.chart-body{flex:1;display:flex;flex-direction:column;min-height:0;position:relative;}

<script>
const API='http://localhost:3000/api';
const DEFAULT_COINS=[
  {s:'BTCUSDT', n:'BTC', full:'Bitcoin',     color:'#f7931a'},
  {s:'ETHUSDT', n:'ETH', full:'Ethereum',    color:'#627eea'},
  {s:'STXUSDT', n:'STX', full:'Stacks',      color:'#9d8fff'},
  {s:'XLMUSDT', n:'XLM', full:'Stellar',     color:'#14b6e7'},
  {s:'SUIUSDT', n:'SUI', full:'Sui Network', color:'#4da2ff'},
  {s:'DOGEUSDT',n:'DOGE',full:'Dogecoin',    color:'#c2a633'},
  {s:'SOLUSDT', n:'SOL', full:'Solana',      color:'#9945ff'},
  {s:'BNBUSDT', n:'BNB', full:'BNB Chain',   color:'#f3ba2f'},
  {s:'AVAXUSDT',n:'AVAX',full:'Avalanche',   color:'#e84142'},
  {s:'DOTUSDT', n:'DOT', full:'Polkadot',    color:'#e6007a'},
];
// โหลด custom coins จาก localStorage
const CUSTOM_KEY='klaud_custom_coins';
function loadSaved(){try{return JSON.parse(localStorage.getItem(CUSTOM_KEY)||'[]');}catch{return[];}}
function saveCoin(c){const arr=loadSaved();if(!arr.find(x=>x.s===c.s)){arr.push(c);localStorage.setItem(CUSTOM_KEY,JSON.stringify(arr));}}
function removeSavedCoin(s){const arr=loadSaved().filter(x=>x.s!==s);localStorage.setItem(CUSTOM_KEY,JSON.stringify(arr));}
const COLORS=['#06b6d4','#8b5cf6','#ec4899','#10b981','#f97316','#6366f1','#14b8a6','#f43f5e','#a855f7','#22d3ee'];
let colorIdx=0;
const COINS=[...DEFAULT_COINS,...loadSaved()];

async function addCoin(){
  const input=document.getElementById('coin-input');
  const msg=document.getElementById('add-msg');
  let sym=input.value.trim().toUpperCase();
  if(!sym){msg.style.color='#f85149';msg.textContent='กรอก symbol ก่อน';return;}
  if(!sym.endsWith('USDT')&&!sym.endsWith('BTC')&&!sym.endsWith('ETH'))sym+='USDT';
  if(COINS.find(c=>c.s===sym)){msg.style.color='#d29922';msg.textContent=sym+' มีอยู่แล้ว';return;}
  msg.style.color='var(--text2)';msg.textContent='⏳ ตรวจสอบ...';
  try{
    const r=await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${sym}`);
    if(!r.ok)throw new Error('ไม่พบ symbol นี้บน Binance');
    const name=sym.replace('USDT','').replace('BTC','').replace('ETH','');
    const coin={s:sym,n:name,full:name,color:COLORS[colorIdx++%COLORS.length],custom:true};
    COINS.push(coin);saveCoin(coin);input.value='';
    msg.style.color='#3fb950';msg.textContent='✅ เพิ่ม '+sym+' แล้ว';
    buildSidebar();setTimeout(()=>{msg.textContent='';},3000);
  }catch(e){msg.style.color='#f85149';msg.textContent='❌ '+e.message;}
}
let idx=0,tf='1d',chartMain=null,chartRSI=null,tvData={};
let show123=true,showABC=true;
let patSeries=[];

// ─── INDICATORS ───
function calcEMA(arr,p){const k=2/(p+1);let prev=null,out=[];for(let i=0;i<arr.length;i++){if(prev===null){if(i<p-1)continue;prev=arr.slice(0,p).reduce((a,b)=>a+b,0)/p;out.push({i,v:prev});continue;}prev=arr[i]*k+prev*(1-k);out.push({i,v:prev});}return out;}
function calcRSIArr(closes,p=14){let g=0,l=0;for(let i=1;i<=p;i++){const d=closes[i]-closes[i-1];if(d>0)g+=d;else l-=d;}let aG=g/p,aL=l/p;const out=new Array(p).fill(null);for(let i=p;i<closes.length;i++){const d=closes[i]-closes[i-1];aG=(aG*(p-1)+Math.max(d,0))/p;aL=(aL*(p-1)+Math.max(-d,0))/p;out.push(aL===0?100:100-100/(1+aG/aL));}return out;}
function calcBBArr(closes,p=20,m=2){return closes.map((_,i)=>{if(i<p-1)return null;const sl=closes.slice(i-p+1,i+1),avg=sl.reduce((a,b)=>a+b,0)/p,std=Math.sqrt(sl.reduce((a,b)=>a+(b-avg)**2,0)/p);return{upper:avg+m*std,lower:avg-m*std};});}

// ─── SWING DETECTION ───
function swingLB(){return tf==='1M'?3:tf==='1w'?4:tf==='1d'?10:tf==='4h'?7:5;}
function findSwings(candles){
  const lb=swingLB(),highs=[],lows=[];
  for(let i=lb;i<candles.length-lb;i++){
    let isH=true,isL=true;
    for(let j=i-lb;j<=i+lb;j++){if(j===i)continue;if(candles[j].high>=candles[i].high)isH=false;if(candles[j].low<=candles[i].low)isL=false;}
    if(isH)highs.push({time:candles[i].time,value:candles[i].high,idx:i});
    if(isL)lows.push({time:candles[i].time,value:candles[i].low,idx:i});
  }
  return{highs,lows};
}

// ─── 3 SWINGS: M1 → M2 → Shock → Retest → M3 ───
// หลักการ:
//   M1 = Impulse move (swing low → swing high for bull)
//   M2 = Retracement 33-62% ของ M1
//   Shock = ราคา Break เหนือ M1 high (bull) หรือใต้ M1 low (bear)
//   Retest = ราคากลับมา test ระดับ Fib 33/50/61.8%
//   M3 Target = 100% of M1 from M2 low

function detect3Swings(candles, highs, lows) {
  const bullSetups = [];
  const bearSetups = [];
  const lastClose  = candles[candles.length-1].close;

  // ── Bullish 3 Swings ──
  for(let i=0; i<lows.length-1; i++){
    const M1start = lows[i];

    // [FIX 1] หา swing high ที่สูงสุดใน 60 แท่งหลัง M1start (ไม่ใช่แค่แรกที่เจอ)
    const hiCandidates = highs.filter(h=>h.idx>M1start.idx && h.idx<M1start.idx+60);
    if(!hiCandidates.length) continue;
    const M1end = hiCandidates.reduce((a,b)=>b.value>a.value?b:a);

    const M1len = M1end.value - M1start.value;
    if(M1len/M1start.value < 0.03) continue;
    // M1 ต้องใช้เวลาอย่างน้อย 3 แท่ง (ไม่ใช่ spike สั้น)
    if(M1end.idx - M1start.idx < 3) continue;

    // [FIX 2] ขยาย M2 window เป็น 80 แท่ง
    const M2low = lows.find(l=>l.idx>M1end.idx && l.idx<M1end.idx+80);
    if(!M2low) continue;
    const retrace = (M1end.value-M2low.value)/M1len;
    // [FIX 3] Retrace ต้องอยู่ใน 33-65% ตรงตาม strategy
    if(retrace<0.30||retrace>0.68) continue;

    const fib333 = M1end.value - M1len*0.333;
    const fib500 = M1end.value - M1len*0.500;
    const fib618 = M1end.value - M1len*0.618;

    // M3 Target = M2low + M1len (C wave = A wave)
    const M3target = M2low.value + M1len;

    const shockCandle = candles.slice(M2low.idx).find(c=>c.close>M1end.value);

    bullSetups.push({
      dir:'bull',
      M1start, M1end, M2low,
      fib333, fib500, fib618,
      retestZoneHi: fib333, retestZoneLo: fib618,
      M3target, shockCandle, M1len,
      color:'#f59e0b',
      retrace: Math.round(retrace*100),
      score: M1len/M1start.value, // ใช้ rank setup ที่ significant ที่สุด
    });
  }

  // ── Bearish 3 Swings ──
  for(let i=0; i<highs.length-1; i++){
    const M1start = highs[i];

    // [FIX 1] หา swing low ที่ต่ำสุดใน 60 แท่งหลัง M1start
    const loCandidates = lows.filter(l=>l.idx>M1start.idx && l.idx<M1start.idx+60);
    if(!loCandidates.length) continue;
    const M1end = loCandidates.reduce((a,b)=>b.value<a.value?b:a);

    const M1len = M1start.value - M1end.value;
    if(M1len/M1start.value < 0.03) continue;
    if(M1end.idx - M1start.idx < 3) continue;

    // [FIX 2] ขยาย M2 window เป็น 80 แท่ง
    const M2high = highs.find(h=>h.idx>M1end.idx && h.idx<M1end.idx+80);
    if(!M2high) continue;
    const retrace = (M2high.value-M1end.value)/M1len;
    if(retrace<0.30||retrace>0.68) continue;

    const fib333 = M1end.value + M1len*0.333;
    const fib500 = M1end.value + M1len*0.500;
    const fib618 = M1end.value + M1len*0.618;
    const M3target = M2high.value - M1len;
    const shockCandle = candles.slice(M2high.idx).find(c=>c.close<M1end.value);

    bearSetups.push({
      dir:'bear',
      M1start, M1end, M2low:M2high,
      fib333, fib500, fib618,
      retestZoneHi: fib618, retestZoneLo: fib333,
      M3target, shockCandle, M1len,
      color:'#f87171',
      retrace: Math.round(retrace*100),
      score: M1len/M1start.value,
    });
  }

  // [FIX 3] แยก Bull/Bear — เลือก setup ที่ significant สุด (score สูงสุด)
  // แสดงแค่ 1 Bull + 1 Bear ที่ชัดที่สุด ไม่ปนกัน
  const bestBull = bullSetups.sort((a,b)=>b.score-a.score).slice(0,1);
  const bestBear = bearSetups.sort((a,b)=>b.score-a.score).slice(0,1);

  // เลือกตาม bias ราคาปัจจุบัน — ถ้าราคาเหนือ M1end ของ bear = bull bias
  // Return ทั้งคู่ แต่ sort ให้ตรง bias ก่อน
  const combined = [...bestBull, ...bestBear]
    .sort((a,b)=> {
      // setup ที่ M2low ใกล้ปัจจุบันมาที่สุดขึ้นก่อน (most recent)
      const aRecent = Math.abs(candles.length - a.M2low.idx);
      const bRecent = Math.abs(candles.length - b.M2low.idx);
      return aRecent - bRecent;
    });
  return combined.slice(0,2);
}

// ─── DRAW 3 SWINGS — TradingView style ───
function drawPatterns(candles, mainChart, cs){
  patSeries.forEach(s=>{try{mainChart.removeSeries(s);}catch(e){}});
  patSeries=[];
  cs.setMarkers([]);

  const {highs, lows} = findSwings(candles);
  const setups = detect3Swings(candles, highs, lows);
  const allMarkers = [];
  let patHtml = '';

  setups.forEach(p=>{
    const isUp = p.dir==='bull';
    const lastTime = candles[candles.length-1].time;
    const fmtV = v => v>100 ? v.toFixed(2) : v.toFixed(5);

    // ── สีประจำแต่ละ direction ──
    const C = isUp ? {
      m1   : '#60a5fa',   // ฟ้า  — M1 impulse
      m2   : '#a78bfa',   // ม่วง — M2 pullback
      shock: '#34d399',   // เขียว — Shock ref line
      f333 : '#4ade80',   // เขียวสด — Fib 33.3%
      f500 : '#facc15',   // เหลืองทอง — Fib 50% ★
      f618 : '#fb923c',   // ส้ม — Fib 61.8%
      m3   : '#38bdf8',   // ฟ้าอ่อน — M3 Target
    } : {
      m1   : '#f87171',   // แดง — M1 impulse
      m2   : '#c084fc',   // ม่วง — M2 pullback
      shock: '#f43f5e',   // แดงเข้ม — Shock ref line
      f333 : '#fb7185',   // ชมพู — Fib 33.3%
      f500 : '#facc15',   // เหลืองทอง — Fib 50% ★
      f618 : '#fb923c',   // ส้ม — Fib 61.8%
      m3   : '#94a3b8',   // เทา — M3 Target (bear)
    };

    // ── M1 Line — impulse move ──
    const m1s = mainChart.addLineSeries({color:C.m1,lineWidth:3,lineStyle:LightweightCharts.LineStyle.Solid,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
    m1s.setData([{time:p.M1start.time,value:p.M1start.value},{time:p.M1end.time,value:p.M1end.value}]);
    patSeries.push(m1s);

    // ── M2 Line — pullback ──
    const m2s = mainChart.addLineSeries({color:C.m2,lineWidth:3,lineStyle:LightweightCharts.LineStyle.Solid,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
    m2s.setData([{time:p.M1end.time,value:p.M1end.value},{time:p.M2low.time,value:p.M2low.value}]);
    patSeries.push(m2s);

    // ── Fib 33.3% — เขียว ──
    const f33s = mainChart.addLineSeries({color:'#4ade80',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dashed,priceLineVisible:false,lastValueVisible:true,crosshairMarkerVisible:false});
    f33s.setData([{time:p.M1start.time,value:p.fib333},{time:lastTime,value:p.fib333}]);
    patSeries.push(f33s);

    // ── Fib 50% — เหลือง หนา (Golden Zone) ──
    const f50s = mainChart.addLineSeries({color:'#facc15',lineWidth:2,lineStyle:LightweightCharts.LineStyle.Solid,priceLineVisible:false,lastValueVisible:true,crosshairMarkerVisible:false});
    f50s.setData([{time:p.M1start.time,value:p.fib500},{time:lastTime,value:p.fib500}]);
    patSeries.push(f50s);

    // ── Fib 61.8% — ส้ม ──
    const f61s = mainChart.addLineSeries({color:'#fb923c',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dashed,priceLineVisible:false,lastValueVisible:true,crosshairMarkerVisible:false});
    f61s.setData([{time:p.M1start.time,value:p.fib618},{time:lastTime,value:p.fib618}]);
    patSeries.push(f61s);

    // ── M3 Target — ฟ้า dotted ──
    const m3s = mainChart.addLineSeries({color:C.m3,lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dotted,priceLineVisible:false,lastValueVisible:true,crosshairMarkerVisible:false});
    m3s.setData([{time:p.M1start.time,value:p.M3target},{time:lastTime,value:p.M3target}]);
    patSeries.push(m3s);

    // ── Markers บน candlestick ──
    allMarkers.push({time:p.M1start.time, position:isUp?'belowBar':'aboveBar', color:C.m1, shape:'circle', size:2, text:'M1'});
    allMarkers.push({time:p.M1end.time,   position:isUp?'aboveBar':'belowBar', color:C.m1, shape:'circle', size:2, text:''});
    allMarkers.push({time:p.M2low.time,   position:isUp?'belowBar':'aboveBar', color:C.m2, shape:'circle', size:3, text:'M2'});
    if(p.shockCandle){
      allMarkers.push({time:p.shockCandle.time, position:isUp?'aboveBar':'belowBar', color:'#facc15', shape:isUp?'arrowUp':'arrowDown', size:2, text:'⚡'});
    }

    // ── Pattern Panel info ──
    const shockPct = p.shockCandle ? '✅ Shock แล้ว' : '⏳ รอ Shock';
    patHtml += `
    <div class="pat-card" style="border:1px solid ${p.color}50">
      <div class="pat-title" style="color:${p.color}">${isUp?'📈':'📉'} 3 Swings ${isUp?'Bullish':'Bearish'}</div>
      <div style="font-size:9px;color:var(--text2);margin-bottom:8px;font-weight:700">M1 → M2 (${p.retrace}% retrace) → Shock → M3</div>
      <div class="pat-row"><span class="pat-k">M1 Start</span><span class="pat-v">${fmtV(p.M1start.value)}</span></div>
      <div class="pat-row"><span class="pat-k">M1 End (Shock ref)</span><span class="pat-v" style="color:${isUp?'#3fb950':'#f85149'}">${fmtV(p.M1end.value)}</span></div>
      <div class="pat-row"><span class="pat-k">M2 (${p.retrace}% retrace)</span><span class="pat-v" style="color:${p.color}">${fmtV(p.M2low.value)}</span></div>
      <div style="background:#1a2030;border-radius:6px;padding:8px;margin:8px 0">
        <div style="font-size:9px;color:var(--text2);font-weight:700;margin-bottom:5px">🎯 RETEST ZONE (เข้าจังหวะ 2)</div>
        <div class="pat-row"><span class="pat-k" style="color:#3fb950">Fib 33.3%</span><span class="pat-v" style="color:#3fb950">${fmtV(p.fib333)}</span></div>
        <div class="pat-row"><span class="pat-k" style="color:#f59e0b">Fib 50% ★</span><span class="pat-v" style="color:#f59e0b">${fmtV(p.fib500)}</span></div>
        <div class="pat-row"><span class="pat-k" style="color:#fb923c">Fib 61.8%</span><span class="pat-v" style="color:#fb923c">${fmtV(p.fib618)}</span></div>
      </div>
      <div class="pat-row"><span class="pat-k" style="color:#58a6ff">M3 Target (100% of M1)</span><span class="pat-v" style="color:#58a6ff">${fmtV(p.M3target)}</span></div>
      <div style="margin-top:8px;padding:6px 8px;border-radius:5px;background:${p.shockCandle?'#3fb95015':'#d2992215'};font-size:10px;font-weight:700;color:${p.shockCandle?'#3fb950':'#d29922'}">${shockPct} ${p.shockCandle?'— รอ Retest Fib Zone เพื่อเข้า':'— อย่าไล่ราคา รอ Shock ก่อน'}</div>
    </div>`;
  });

  if(allMarkers.length && cs){
    allMarkers.sort((a,b)=>a.time-b.time);
    cs.setMarkers(allMarkers);
  }

  const pc = document.getElementById('patterns-content');
  if(pc) pc.innerHTML = setups.length ? patHtml : '<div style="color:var(--text2);text-align:center;padding:30px;font-size:12px">ไม่พบ 3 Swings Setup ที่ชัดเจนใน TF นี้<br>ลอง TF ที่ใหญ่กว่า เช่น 4H หรือ 1D</div>';
}

// ─── DRAW CHART ───
function fmt(p){return p>=1000?'$'+p.toLocaleString('en',{maximumFractionDigits:2}):p>=1?'$'+p.toFixed(4):'$'+p.toFixed(6);}

async function drawChart(c,candles,tvAna){
  const loading=document.getElementById('chart-loading');
  // destroy old
  if(chartMain){chartMain.remove();chartMain=null;patSeries=[];}
  if(chartRSI){chartRSI.remove();chartRSI=null;}
  if(!candles||!candles.length){loading.style.display='none';return;}

  const mainEl=document.getElementById('chart-main');
  const rsiEl =document.getElementById('chart-rsi');

  // ── Main chart ──
  chartMain=LightweightCharts.createChart(mainEl,{
    layout:{background:{color:'#07090f'},textColor:'#8b949e',fontSize:11},
    grid:{vertLines:{color:'#1a2030'},horzLines:{color:'#161b22'}},
    rightPriceScale:{borderColor:'#21262d',textColor:'#8b949e'},
    timeScale:{borderColor:'#21262d',timeVisible:true,visible:true},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal,vertLine:{color:'#ffffff20'},horzLine:{color:'#ffffff20'}},
    width:mainEl.offsetWidth, height:mainEl.offsetHeight,
  });

  // Candles
  const cs=chartMain.addCandlestickSeries({
    upColor:'#26a69a',downColor:'#ef5350',
    borderUpColor:'#26a69a',borderDownColor:'#ef5350',
    wickUpColor:'#26a69a',wickDownColor:'#ef5350',
  });
  cs.setData(candles);

  const closes=candles.map(c=>c.close);

  // EMA 20
  const ema20=calcEMA(closes,20);
  const ema20s=chartMain.addLineSeries({color:'#3b82f6',lineWidth:1,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
  ema20s.setData(ema20.map(e=>({time:candles[e.i].time,value:e.v})));

  // EMA 30
  const ema30=calcEMA(closes,30);
  const ema30s=chartMain.addLineSeries({color:'#f97316',lineWidth:1,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
  ema30s.setData(ema30.map(e=>({time:candles[e.i].time,value:e.v})));

  // BB — faint, upper/lower only
  const bbArr=calcBBArr(closes);
  const bbUp=candles.map((c,i)=>bbArr[i]?{time:c.time,value:bbArr[i].upper}:null).filter(Boolean);
  const bbLo=candles.map((c,i)=>bbArr[i]?{time:c.time,value:bbArr[i].lower}:null).filter(Boolean);
  chartMain.addLineSeries({color:'#6d28d945',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dashed,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false}).setData(bbUp);
  chartMain.addLineSeries({color:'#6d28d945',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dashed,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false}).setData(bbLo);

  // ── Draw 1-2-3 & ABC patterns ──
  drawPatterns(candles, chartMain, cs);

  // Visible range: last 80 candles
  const vis=candles.slice(-80);
  chartMain.timeScale().setVisibleRange({from:vis[0].time,to:vis[vis.length-1].time});

  // ── RSI sub-chart ──
  chartRSI=LightweightCharts.createChart(rsiEl,{
    layout:{background:{color:'#07090f'},textColor:'#8b949e',fontSize:10},
    grid:{vertLines:{color:'#1a2030'},horzLines:{color:'#161b22'}},
    rightPriceScale:{borderColor:'#21262d',textColor:'#8b949e',scaleMargins:{top:.1,bottom:.1}},
    timeScale:{borderColor:'#21262d',timeVisible:false,visible:false},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
    width:rsiEl.offsetWidth, height:rsiEl.offsetHeight,
  });

  const rsiArr=calcRSIArr(closes,14);
  const rsiData=candles.map((c,i)=>rsiArr[i]!==null?{time:c.time,value:rsiArr[i]}:null).filter(Boolean);
  const rsiSeries=chartRSI.addLineSeries({color:'#3b82f6',lineWidth:1,priceLineVisible:false,lastValueVisible:true,crosshairMarkerVisible:false});
  rsiSeries.setData(rsiData);
  // Overbought/Oversold lines
  const rsiHi=rsiData.map(d=>({time:d.time,value:70}));
  const rsiLo=rsiData.map(d=>({time:d.time,value:30}));
  chartRSI.addLineSeries({color:'#f8514940',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dashed,priceLineVisible:false,lastValueVisible:false}).setData(rsiHi);
  chartRSI.addLineSeries({color:'#3fb95040',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dashed,priceLineVisible:false,lastValueVisible:false}).setData(rsiLo);
  // RSI 50 line
  chartRSI.addLineSeries({color:'#ffffff15',lineWidth:1,priceLineVisible:false,lastValueVisible:false}).setData(rsiData.map(d=>({time:d.time,value:50})));

  chartRSI.timeScale().setVisibleRange({from:vis[0].time,to:vis[vis.length-1].time});

  // Sync time scales
  chartMain.timeScale().subscribeVisibleTimeRangeChange(range=>{
    if(range&&chartRSI)try{chartRSI.timeScale().setVisibleRange(range);}catch(e){}
  });

  loading.style.display='none';

  // Responsive
  const ro=new ResizeObserver(()=>{
    if(chartMain)chartMain.applyOptions({width:mainEl.offsetWidth,height:mainEl.offsetHeight});
    if(chartRSI)chartRSI.applyOptions({width:rsiEl.offsetWidth,height:rsiEl.offsetHeight});
  });
  ro.observe(mainEl); ro.observe(rsiEl);
}

// ─── LOAD COIN ───
async function loadCoin(i){
  idx=i;
  const c=COINS[i];
  document.querySelectorAll('.coin-item').forEach((el,j)=>el.classList.toggle('active',j===i));
  document.querySelectorAll('.scan-row').forEach((el,j)=>el.classList.toggle('active-row',j===i));
  document.getElementById('cc-icon').textContent=c.n;
  document.getElementById('cc-icon').style.cssText=`background:${c.color}25;color:${c.color};width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;`;
  document.getElementById('cc-name').textContent=c.s;
  document.getElementById('cc-full').textContent=c.full+' · '+tf.toUpperCase();
  const loading=document.getElementById('chart-loading');
  loading.style.display='flex';
  document.getElementById('load-msg').textContent=`กำลังโหลด ${c.n}...`;

  // ถ้า exchange !== BINANCE ให้ดึงผ่าน TradingView MCP endpoint
  const isTVAsset = c.exchange && c.exchange !== 'BINANCE';
  const rawSym = isTVAsset ? c.s.replace(/^[^:]+:/,'') : c.s;
  const exchParam = c.exchange || 'BINANCE';
  const candlesP = isTVAsset
    ? Promise.resolve([])  // TV assets ไม่มี candle Binance
    : fetch(`${API}/candles/${c.s}?interval=${tf}&limit=300`).then(r=>r.json()).catch(()=>[]);
  const anaP = isTVAsset
    ? fetch(`${API}/tv-analysis/${rawSym}?exchange=${exchParam}&tf=${tf}`).then(r=>r.json()).catch(()=>null)
    : fetch(`${API}/analysis/${c.s}?tf=${tf}`).then(r=>r.json()).catch(()=>null);

  // Analysis ปรากฏทันที ไม่ต้องรอ chart
  anaP.then(a=>{if(a&&!a.error){tvData[c.s]=a;updateAnalysisPanel(c,a);updatePriceHeader(c,a);}});

  const[candles,tvAna]=await Promise.all([candlesP,anaP]);
  tvData[c.s]=tvAna;
  await drawChart(c,candles,tvAna);
  if(tvAna&&!tvAna.error){updateAnalysisPanel(c,tvAna);updatePriceHeader(c,tvAna);}
}

// ─── SIDEBAR / SCANNER ───
function buildSidebar(){
  const el=document.getElementById('sidebar-coins');
  el.innerHTML='';
  COINS.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='coin-item'+(i===idx?' active':'');d.id='sc-'+i;
    d.innerHTML=`
      <div class="coin-dot" style="background:${c.color}"></div>
      <span style="font-size:12px;font-weight:700;flex:1;cursor:pointer" onclick="loadCoin(${i})">${c.n}</span>
      <span style="font-size:10px;font-weight:600" id="sp-${i}">–</span>
      ${c.custom?`<span onclick="delCoin('${c.s}')" style="font-size:10px;color:var(--text3);cursor:pointer;padding:0 2px;margin-left:2px" title="ลบ">✕</span>`:''}
    `;
    d.querySelector('span')?.addEventListener('click',()=>loadCoin(i));
    el.appendChild(d);
  });
}
function delCoin(s){
  const i=COINS.findIndex(c=>c.s===s);
  if(i>-1){COINS.splice(i,1);removeSavedCoin(s);}
  if(idx>=COINS.length)idx=COINS.length-1;
  buildSidebar();
  loadCoin(idx);
}

    const col=bias==='Bullish'?'#3fb950':bias==='Bearish'?'#f85149':'#d29922';
    const row=document.createElement('div');
    row.className='scan-row'+(i===idx?' active-row':'');row.id='sr-'+i;
    row.innerHTML=`<div class="coin-dot" style="background:${c.color}"></div><span style="font-size:12px;font-weight:700;min-width:44px">${c.n}</span><span style="flex:1;font-size:10px;color:${col};font-weight:700">${bias==='Bullish'?'📈':bias==='Bearish'?'📉':'📊'} ${bias}</span><span style="font-size:10px;color:var(--text2)">RSI ${d?.rsi?.value||'–'}</span>`;
    row.onclick=()=>loadCoin(i);el.appendChild(row);
  });
}

async function refreshPrices(){
  try{
    const r=await fetch(`${API}/prices?symbols=${COINS.map(c=>c.s).join(',')}`).then(r=>r.json());
    r.forEach((d,i)=>{
      const sp=document.getElementById('sp-'+i);const chg=parseFloat(d.priceChangePercent);
      if(sp){sp.textContent=(chg>=0?'+':'')+chg.toFixed(2)+'%';sp.style.color=chg>=0?'#3fb950':'#f85149';}
    });
    const bar=document.getElementById('market-bar');bar.innerHTML='';
    r.slice(0,8).forEach(d=>{
      const p=parseFloat(d.lastPrice),chg=parseFloat(d.priceChangePercent);
      const sym=d.symbol.replace('USDT','');
      const fp=p>=1000?'$'+p.toLocaleString('en',{maximumFractionDigits:2}):p>=1?'$'+p.toFixed(3):'$'+p.toFixed(5);
      bar.innerHTML+=`<div class="market-ticker"><span class="mt-sym">${sym}</span><span class="mt-price">${fp}</span><span class="mt-chg ${chg>=0?'up':'dn'}">${chg>=0?'▲':'▼'}${Math.abs(chg).toFixed(2)}%</span></div>`;
    });
  }catch(e){}
}

function toggleP(type){
  if(type==='123'){show123=!show123;document.getElementById('tog123').classList.toggle('on',show123);}
  loadCoin(idx);
}

function switchTab(tab,btn){
  document.querySelectorAll('.panel-tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');
  ['analysis','patterns','scanner'].forEach(t=>{document.getElementById('panel-'+t).style.display=t===tab?'block':'none';});
  if(tab==='scanner')buildScanner();
}

function changeTF(t,btn){
  tf=t;document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  document.getElementById('cc-full').textContent=COINS[idx].full+' · '+t.toUpperCase();
  loadCoin(idx);
}

function refreshAll(){loadCoin(idx);refreshPrices();}

// Keyboard nav
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')loadCoin(Math.min(idx+1,COINS.length-1));
  if(e.key==='ArrowLeft')loadCoin(Math.max(idx-1,0));
});

// ─── INIT ───
buildNav('Dashboard');
buildSidebar();
refreshPrices();
const urlCoin=new URLSearchParams(location.search).get('coin');
const startIdx=urlCoin?Math.max(0,COINS.findIndex(c=>c.s===urlCoin)):0;
loadCoin(startIdx);
setInterval(refreshPrices,30000);
// Prefetch
setTimeout(()=>COINS.forEach((_,i)=>{if(i!==startIdx)setTimeout(()=>fetch(`${API}/analysis/${COINS[i].s}?tf=${tf}`).catch(()=>{}),i*600);}),3000);
</script>
