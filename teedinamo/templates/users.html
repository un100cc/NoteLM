{% extends "base.html" %}
{% block title %}จัดการผู้ใช้ — TeeDinamo{% endblock %}
{% block content %}
<h2 style="margin-bottom:20px">จัดการผู้ใช้</h2>
<div class="users-layout">

  <!-- Create User -->
  <div class="card">
    <h3>เพิ่มผู้ใช้ใหม่</h3>
    <form method="POST" action="{{ url_for('auth.create_user_route') }}">
      <div class="form-group">
        <label>ชื่อผู้ใช้</label>
        <input type="text" name="username" required>
      </div>
      <div class="form-group">
        <label>รหัสผ่าน</label>
        <input type="password" name="password" required>
      </div>
      <div class="form-group">
        <label>Role</label>
        <select name="role">
          <option value="staff">Staff</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="form-group">
        <label>ระดับราคา</label>
        <select name="price_level">
          <option value="normal">ราคาปกติ</option>
          <option value="tech">ราคาช่าง</option>
          <option value="exchange">ราคาแลกเปลี่ยน</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary">สร้างผู้ใช้</button>
    </form>
  </div>

  <!-- User List -->
  <div class="card">
    <h3>รายชื่อผู้ใช้</h3>
    {% for u in users %}
    <details style="border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:8px;">
      <summary style="cursor:pointer;font-weight:600">
        {{ u.username }}
        <span style="font-size:12px;color:var(--muted);margin-left:8px">{{ u.role }} | {{ u.price_level }}</span>
      </summary>
      <form method="POST" action="{{ url_for('auth.update_user_route', uid=u.id) }}" style="margin-top:12px">
        <div class="form-group">
          <label>Role</label>
          <select name="role">
            <option value="staff" {% if u.role=='staff' %}selected{% endif %}>Staff</option>
            <option value="admin" {% if u.role=='admin' %}selected{% endif %}>Admin</option>
          </select>
        </div>
        <div class="form-group">
          <label>ระดับราคา</label>
          <select name="price_level">
            <option value="normal"   {% if u.price_level=='normal'   %}selected{% endif %}>ราคาปกติ</option>
            <option value="tech"     {% if u.price_level=='tech'     %}selected{% endif %}>ราคาช่าง</option>
            <option value="exchange" {% if u.price_level=='exchange' %}selected{% endif %}>ราคาแลกเปลี่ยน</option>
          </select>
        </div>
        <div class="form-group">
          <label>รหัสผ่านใหม่ (เว้นว่างถ้าไม่เปลี่ยน)</label>
          <input type="password" name="password">
        </div>
        <div style="display:flex;gap:8px">
          <button type="submit" class="btn btn-primary btn-sm">บันทึก</button>
          <button type="submit" form="del-{{ u.id }}" class="btn btn-danger btn-sm"
            onclick="return confirm('ลบผู้ใช้ {{ u.username }}?')">ลบ</button>
        </div>
      </form>
      <form id="del-{{ u.id }}" method="POST" action="{{ url_for('auth.delete_user_route', uid=u.id) }}"></form>
    </details>
    {% endfor %}
  </div>

</div>
{% endblock %}
