const API = 'http://localhost:3000/api';
let liveData = {}, activeFilter = 'all', isLoading = false;
function fmt(p){return p>=1000?'$'+p.toLocaleString('en',{maximumFractionDigits:2}):p>=1?'$'+p.toFixed(3):'$'+p.toFixed(6);}

// ─── Determine 3 Swings setup from live analysis ───
function getSetup(ana) {
  if(!ana||ana.error) return {setup:'–',label:'–',color:'#8b949e',m1:'–',m2:'–',m3:'–',m1c:'#484f58',m2c:'#484f58',m3c:'#484f58',ana:'ไม่มีข้อมูล'};
  const rsi    = ana.rsi?.value || 50;
  const macdH  = ana.macd?.histogram || 0;
  const bias   = ana.timeframe_context?.bias || 'Neutral';
  const bbPos  = ana.bollinger_bands?.position || '';
  const adx    = ana.adx?.value || 0;
  const rsiDir = ana.rsi?.direction || 'Flat';
  const diSig  = ana.adx?.di_signal || '';

  // ✅ BUY — M3 confirmed + strong momentum (Best setup)
  // Bullish bias + RSI > 55 + MACD > 0 + BB Upper Half + +DI > -DI
  if(bias==='Bullish' && rsi>55 && macdH>0 && bbPos.includes('Upper') && diSig.includes('+DI > -DI')) {
    return {setup:'buy',label:'🟢 BUY Signal',color:'#3fb950',m1:'▼',m2:'✅',m3:'▲',m1c:'#f85149',m2c:'#3fb950',m3c:'#3fb950',
      ana:`✅ Bias Bullish · RSI ${rsi.toFixed(1)} > 55 · MACD Hist +${macdH.toFixed(4)} · BB Upper · +DI > -DI → ยืนยัน M3`};
  }
  // 📈 M3 — Bullish setup (momentum building)
  if(bias==='Bullish' && rsi>50 && macdH>0) {
    return {setup:'m3',label:'📈 M3 Setup',color:'#3fb950',m1:'▼',m2:'✅',m3:'▲',m1c:'#f85149',m2c:'#3fb950',m3c:'#3fb950',
      ana:`Bias Bullish · RSI ${rsi.toFixed(1)} > 50 · MACD Hist ✅ → M3 กำลังเริ่ม`};
  }
  // 🔥 Shock Retest — MACD พลิก Bullish + RSI 35–55 Rising (M2 จบ รอ entry)
  if(macdH>0 && rsiDir==='Rising' && rsi>=35 && rsi<=55) {
    return {setup:'shock',label:'🔥 Shock Retest',color:'#f59e0b',m1:'▼',m2:'⏸',m3:'⏳',m1c:'#f85149',m2c:'#f59e0b',m3c:'#388bfd',
      ana:`MACD Hist +${macdH.toFixed(4)} · RSI ${rsi.toFixed(1)} Rising → M2 ใกล้จบ รอ Retest Fib Zone ⚡`};
  }
  // ⚠️ Strong Bear — RSI Falling + ADX แข็งแกร่ง + Bearish bias (ต้องเช็คก่อน M2)
  if(bias==='Bearish' && rsiDir==='Falling' && adx>40) {
    return {setup:'bear',label:'⚠️ Strong Bear',color:'#f85149',m1:'▼',m2:'▼',m3:'❓',m1c:'#f85149',m2c:'#f85149',m3c:'#484f58',
      ana:`Bias Bearish · ADX ${adx} Strong · RSI ${rsi.toFixed(1)} Falling · ยังไม่ใช่เวลาเข้า Long`};
  }
  // 📊 M2 Pullback — MACD เริ่มพลิก (fallback หลัง Bear)
  if(macdH>0 && rsi<55) {
    return {setup:'m2',label:'📊 M2 Pullback',color:'#58a6ff',m1:'▼',m2:'⏸',m3:'⏳',m1c:'#f85149',m2c:'#d29922',m3c:'#388bfd',
      ana:`MACD พลิก Bullish · RSI ${rsi.toFixed(1)} · รอ Shock ผ่าน EMA30 ก่อน entry`};
  }
  // Default: Sideways / Ranging
  return {setup:'m2',label:'📊 Sideways',color:'#8b949e',m1:'–',m2:'⏸',m3:'–',m1c:'#484f58',m2c:'#d29922',m3c:'#484f58',
    ana:`RSI ${rsi.toFixed(1)} · Sideways · รอ Breakout พร้อม Volume ชัดก่อน`};
}

// ─── Scan all coins live ───
async function scanAll() {
  if(isLoading) return;
  isLoading = true;
  const el = document.getElementById('coin-grid');
  el.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text2)">
    <div style="width:32px;height:32px;border:2px solid #21262d;border-top-color:#58a6ff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px"></div>
    <div style="font-size:13px">กำลัง Scan ${COINS.length} เหรียญ จาก Binance...</div>
  </div>`;

  // ดึงราคา + analysis พร้อมกันทุกเหรียญ
  const [priceRes, ...anaRes] = await Promise.all([
    fetch(`${API}/prices?symbols=${COINS.map(c=>c.s).join(',')}`).then(r=>r.json()).catch(()=>[]),
    ...COINS.map(c=>fetch(`${API}/analysis/${c.s}?tf=1h`).then(r=>r.json()).catch(()=>null))
  ]);

  // Map prices
  priceRes.forEach(d=>{liveData[d.symbol]={p:+d.lastPrice,chg:+d.priceChangePercent};});
  // Map analysis
  COINS.forEach((c,i)=>{if(anaRes[i])liveData[c.s]={...liveData[c.s],ana:anaRes[i]};});

  fetchMarketBar();
  buildCards();
  isLoading = false;
}

function buildCards() {
  const el = document.getElementById('coin-grid'); el.innerHTML = '';
  const counts = {buy:0,m3:0,shock:0,m2:0,bear:0};

  COINS.forEach((c,i) => {
    const pd  = liveData[c.s]||{};
    const ana = pd.ana||null;
    const setup = getSetup(ana);

    counts[setup.setup] = (counts[setup.setup]||0)+1;
    if(activeFilter!=='all' && setup.setup!==activeFilter) return;

    const p   = pd.p ? fmt(pd.p) : '–';
    const chg = pd.chg||0;
    const rsi = ana?.rsi?.value||'–';
    const ema20 = ana?.ema?.ema20||0;
    const ema30 = ana?.ema?.ema30||0;
    const adx   = ana?.adx?.value||0;
    const macdH = ana?.macd?.histogram||0;
    const s1    = ana?.support_resistance?.support_1||0;
    const r1    = ana?.support_resistance?.resistance_1||0;

    const card = document.createElement('a');
    card.href  = `index.html?coin=${c.s}`;
    card.className = 'coin-card';
    card.innerHTML = `
      <div class="cc-top">
        <div class="cc-left">
          <div class="cc-icon" style="background:${c.color}25;color:${c.color}">${c.n}</div>
          <div><div class="cc-sym">${c.n}</div><div class="cc-full">${c.full}</div></div>
        </div>
        <div class="cc-price">
          <div class="cc-p">${p}</div>
          <div class="cc-c ${chg>=0?'up':'dn'}">${chg>=0?'▲ +':'▼ '}${Math.abs(chg).toFixed(2)}%</div>
        </div>
      </div>

      <span class="tag tag-${setup.setup}" style="margin-top:8px">${setup.label}</span>

      <div style="margin:8px 0 4px">
        <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text2);margin-bottom:3px">
          <span>RSI 14</span><span style="color:${typeof rsi==='number'&&rsi<40?'#f85149':rsi>55?'#3fb950':'#d29922'};font-weight:700">${typeof rsi==='number'?rsi.toFixed(1):rsi}</span>
        </div>
        <div style="background:var(--bg3);border-radius:3px;height:4px"><div style="width:${typeof rsi==='number'?rsi:50}%;height:100%;border-radius:3px;background:linear-gradient(90deg,#f85149,#d29922,#3fb950)"></div></div>
      </div>

      <div class="cc-swing" style="margin:10px 0 8px">
        <div class="cc-sw" style="background:${setup.m1c}18;color:${setup.m1c}">M1 ${setup.m1}</div>
        <div class="cc-sa">›</div>
        <div class="cc-sw" style="background:${setup.m2c}18;color:${setup.m2c}">M2 ${setup.m2}</div>
        <div class="cc-sa">›</div>
        <div class="cc-sw" style="background:${setup.m3c}18;color:${setup.m3c}">M3 ${setup.m3}</div>
      </div>

      <div class="cc-levels">
        <div class="cc-lv"><div class="cc-lv-l">🛡 S1</div><div class="cc-lv-v" style="color:var(--green)">${s1?fmt(s1):'–'}</div></div>
        <div class="cc-lv"><div class="cc-lv-l">⛔ R1</div><div class="cc-lv-v" style="color:var(--red)">${r1?fmt(r1):'–'}</div></div>
        <div class="cc-lv"><div class="cc-lv-l">📐 EMA30</div><div class="cc-lv-v" style="color:#f97316">${ema30?fmt(ema30):'–'}</div></div>
      </div>

      <div style="margin-top:8px;font-size:10px;color:var(--text2);line-height:1.6">${setup.ana}</div>

      <div style="display:flex;gap:6px;margin-top:8px;font-size:9px;font-weight:700">
        <span style="padding:2px 6px;border-radius:4px;background:#21262d;color:${adx>50?'#f85149':adx>25?'#d29922':'#8b949e'}">ADX ${adx}</span>
        <span style="padding:2px 6px;border-radius:4px;background:#21262d;color:${macdH>0?'#3fb950':'#f85149'}">MACD ${macdH>0?'+':''}${Number(macdH).toFixed(4)}</span>
      </div>`;
    el.appendChild(card);
  });

  // Update counts
  const total = Object.values(counts).reduce((a,b)=>a+b,0);
  document.getElementById('cnt-buy').textContent  = counts.buy||0;
  document.getElementById('cnt-m3').textContent   = counts.m3||0;
  document.getElementById('cnt-shock').textContent= counts.shock||0;
  document.getElementById('cnt-m2').textContent   = counts.m2||0;
  document.getElementById('cnt-bear').textContent = counts.bear||0;
  // Update page-sub
  document.querySelector('.page-sub').textContent = `สแกน ${COINS.length} เหรียญ · แสดงผล ${total} · อัปเดต ${new Date().toLocaleTimeString('th-TH')}`;
}

function filter(f,btn){
  activeFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildCards();
}

// Refresh ทุก 60 วินาที
buildNav('Scanner');
scanAll();
setInterval(scanAll, 60000);
</script>
</body>
</html>
